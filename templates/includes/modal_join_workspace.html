<div class="modal fade" id="JoinWorkspaceModal" tabindex="-1" aria-labelledby="JoinWorkspaceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom_modal_shadow">

            <div class="modal-header">
                <h1 class="modal-title fs-5" id="JoinWorkspaceModalLabel">
                    Join to workspace
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label text-muted">Invite code</label>
                    <input type="text"
                            class="form-control fw-bold text-center"
                            id="joinCode"
                            placeholder="A8M4-J0Q1"
                            maxlength="9"
                            autocomplete="off">
                    <div class="form-text">Enter the code you received from worksapce owner</div>
                </div>

                <div id="joinAlert" class="d-none"></div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="joinBtn"> Join </button>
            </div>

        </div>
    </div>
</div>
