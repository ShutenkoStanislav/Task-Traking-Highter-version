<div class="modal fade" id="TaskModal" tabindex="-1" aria-labelledby="TaskModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom_modal_shadow">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="TaskModalLabel">Add Task</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form method="post" action="{% url 'tasks:task-create' %}">
                <div class="modal-body p-4">
                    {% csrf_token %}

                    {% if current_folder %}
                        <input type="hidden" name="folder" value="{{ current_folder.id }}">
                    {% endif %}

                    <div class="d-flex gap-3">
                        <div class="d-flex flex-column gap-3 flex-grow-1">
                            <div id="task-title-wrap">
                                {{ task_form.title }}
                            </div>
                            <div id="task-desc-wrap">
                                {{ task_form.description }}
                            </div>
                        </div>
  
                        <div id="task-workspace-fields" class="d-none flex-column gap-5 mt-3" style="min-width: 180px;">
                            <div class="dropdown">
                                <button class="btn btn-sm dropdown-toggle custom_priorety_select_btn custom_box_select_btn_lg shadow_custom_dropdown w-100 text-start"
                                        type="button" data-bs-toggle="dropdown" id="task-box-btn">
                                    <span id="task-box-label">Box</span>
                                </button>
                                <ul class="dropdown-menu shadow custom_priorety_select_menu custom_priorety_select_menu_lg" id="task-box-dropdown">
                                </ul>
                                <input type="hidden" id="task-box-hidden" value="">
                            </div>  

                            <div class="dropdown">
                                <button class="btn btn-sm dropdown-toggle custom_priorety_select_btn custom_box_select_btn_lg shadow_custom_dropdown w-100 text-start"
                                        type="button" data-bs-toggle="dropdown" id="task-folder-btn" disabled>
                                    <span id="task-folder-label">Folder</span>
                                </button>
                                <ul class="dropdown-menu shadow custom_priorety_select_menu custom_priorety_select_menu_lg" id="task-folder-dropdown">
                                </ul>
                                <input type="hidden" name="folder" id="task-folder-hidden" value="">
                            </div>
                        </div>
                    </div>

                    <br>
                    <div class="row g-3">
                        <div class="col-md-4">
                            {{ task_form.due_date }}
                        </div>
                        <div class="col-md-4">
                            <div class="dropdown">
                                <button class="btn btn-sm dropdown-toggle custom_priorety_select_btn custom_priorety_select_btn_lg shadow_custom_dropdown"
                                    type="button" data-bs-toggle="dropdown">
                                    <span id="create-priority-label">🟩 Low</span>
                                </button>
                                <ul class="dropdown-menu shadow custom_priorety_select_menu custom_priorety_select_menu_lg">
                                    <li><a class="dropdown-item rounded-3" href="#" onclick="createPriority('low', '🟩 Low')">🟩 Low</a></li>
                                    <li><a class="dropdown-item rounded-3" href="#" onclick="createPriority('medium', '🟨 Medium')">🟨 Medium</a></li>
                                    <li><a class="dropdown-item rounded-3" href="#" onclick="createPriority('high', '🟥 High')">🟥 High</a></li>
                                </ul>
                                <input type="hidden" name="priority" id="create-priority" value="low">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Add</button>
                </div>
            </form>
        </div>
    </div>
</div>
