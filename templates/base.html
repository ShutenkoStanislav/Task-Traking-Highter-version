<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task traking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/modal_style.css'%}">
    <script>
        if (localStorage.getItem('folderOpen') === 'false') {
            document.addEventListener('DOMContentLoaded', function() {
                const fl = document.getElementById('folder_list');
                if (fl) {
                    fl.style.maxHeight = '0';
                    fl.style.opacity = '0';
                }
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
        flatpickr(".minimalist-date-picker", {
            altInput: true,
            altFormat: "F j, Y",
            dateFormat: "Y-m-d",
            static: true 
            });
        });

    </script>
</head>
<body>

    {% block content %}
    {% endblock %}

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    
    {% block extra_js %}
    <script src="{% static 'js/task_complete.js' %}"></script>
    <script src="{% static 'js/edit_task.js' %}"></script>
    <script src="{% static 'js/open_edit_task.js' %}"></script>
    <script src="{% static 'js/flex_leftbar.js' %}"></script>
    <script src="{% static 'js/workspace_create.js' %}"></script>
    {% endblock %}

</body>
</html>
