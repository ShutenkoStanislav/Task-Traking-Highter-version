{% if user_role == 'owner' or user_role == 'admin' %}
<div class="modal fade" 
        id="InviteModal" tabindex="-1"
        aria-labelledby="InviteModalLabel"
        aria-hidden="true"
        data-workspace-pk="{{ workspace.pk }}"
    >
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom_modal_shadow">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="InviteModalLabel">
                    Invite member
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label text-muted">Email address</label>
                    <input type="email"
                        class="form-control"
                        id="inviteEmail"
                        placeholder="user@example.com">
                </div>

                {% if user_role == 'owner' %}
                <div class="mb-3">
                    <label class="form-label text-muted">Role</label>
                    <div class="dropdown">
                        <button class="btn btn-sm dropdown-toggle shadow_custom_dropdown custom_priorety_select_btn"
                            type="button"
                            data-bs-toggle="dropdown">
                            <span id="inviteRoleLabel">Member</span>
                        </button>
                        <ul class="dropdown-menu shadow custom_priorety_select_menu">
                            <li>
                                <a class="dropdown-item" href="#" onclick="setInviteRole('member', 'member')">
                                    Member
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#" onclick="setInviteRole('admin', 'admin')">
                                    Admin
                                </a>
                            </li>
                        </ul>
                        <input type="hidden" id="inviteRole" value="member">
                    </div>
                </div>
                {% else %}
                    <input type="hidden" id="inviteRole" value="member">   
                {% endif %}

                <div id="inviteAlert" class="d-none mb-3"></div>

            </div>

            <div class="modal-footer">
                <button type="button"
                        class="btn btn-outline-secondary"
                        data-bs-dismiss="modal">Cancel</button>

                <button type="button"
                        class="btn btn-success"
                        id="sendInviteBtn"
                       ><i class="bi bi-send"></i> Send invite</button>
            </div>

            <div id="inviteLinkBlock" class="d-none px-3 pb-3">
                <hr class="mt-0">
                <label class="form-label text-muted">
                    <i class="bi bi-link-45deg"></i> Invite link
                    <small class="text-muted">Valid for 7 days</small>
                </label>
                <div class="input-group">
                    <input type="text" class="form-control" id="inviteLinkText" readonly>
                    <button class="btn btn-outline-secondary shadow_custom_dropdown" id="copyLinkBtn">
                        <i class="bi bi-clipboard"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
</div>
{% endif %}
