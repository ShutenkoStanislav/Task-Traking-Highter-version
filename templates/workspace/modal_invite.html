{% if user_role == 'owner' or user_role == 'admin' %}
<div class="modal fade" 
        id="InviteModal" tabindex="-1"
        aria-labelledby="InviteModalLabel"
        aria-hidden="true"
        data-workspace-pk="{{ workspace.pk }}"
    >
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom_modal_shadow">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="InviteModalLabel">
                    Invite member
                </h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">

                {% if user_role == 'owner' %}
                <div class="mb-3">
                    <label class="form-label text-muted">Role</label>
                    <div class="dropdown">
                        <button class="btn btn-sm dropdown-toggle shadow_custom_dropdown custom_priorety_select_btn_lg"
                            type="button"
                            data-bs-toggle="dropdown">
                            <span id="inviteRoleLabel">Member</span>
                        </button>
                        <ul class="dropdown-menu shadow custom_priorety_select_menu_lg">
                            <li>
                                <a class="dropdown-item" href="#" onclick="setInviteRole('member', 'Member')">
                                    Member
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="#" onclick="setInviteRole('admin', 'Admin')">
                                    Admin
                                </a>
                            </li>
                        </ul>
                        <input type="hidden" id="inviteRole" value="member">
                    </div>
                </div>
                {% else %}
                    <div class="mb-3">
                        <p class="text-muted">
                            <i class="bi bi-info-circle me-1"></i>
                            As an Admin you can only invite <strong>Members</strong>
                        </p>
                    </div>
                    <input type="hidden" id="inviteRole" value="member">
                {% endif %}

                <div id="inviteCodeBlock" class="d-none mt-3">
                    <label class="form-label text-muted mb-1">
                        <i class="bi bi-key me-1"></i> Invite code
                        <small class="text-muted">· Valid for 24 hours</small>
                    </label>
                    <div class="position-relative">
                        <input type="text"
                               class="form-control fw-bold text-center pe-5"
                               id="inviteCodeText"
                               readonly>
                        <button class="btn position-absolute top-50 end-0 translate-middle-y me-1"
                                id="copyLinkBtn">
                            <i class="bi bi-clipboard"></i>
                        </button>
                    </div>
                </div>

                <div id="inviteAlert" class="d-none mt-3"></div>

            </div>

            <div class="modal-footer">
                <button type="button"
                        class="btn btn-outline-secondary"
                        data-bs-dismiss="modal">Cancel</button>

                <button type="button"
                        class="btn btn-success"
                        id="sendInviteBtn">
                    Generate code
                </button>
            </div>

        </div>
    </div>
</div>
{% endif %}
