<div class="modal fade" id="WorkspaceModal" tabindex="-1" aria-labelledby="WorkspaceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            
            
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="WorkspaceModalLabel">Add Workspace</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            
            <form method="post" action="{% url 'workspace:workspace_create' %}">
                <div class="modal-body p-4">
                    {% csrf_token %}
                    

                    <div class="mb-3">
                        <label class="form-label"></label>
                        {{ workspace_form.name }}
                    </div>

                    <h5>Choose size for workspace</h5>
                    <div class="dropdown">
                        <button class="btn btn-sm dropdown-toggle custom_priorety_select_btn custom_priorety_select_btn_lg"
                            type="button" data-bs-toggle="dropdown">
                            <span id="create-size-workspace-label">Just me</span>
                        </button>
                        <ul class="dropdown-menu shadow custom_priorety_select_menu custom_priorety_select_menu_lg">
                            <li><a class="dropdown-item rounded-3" href="#" onclick="createWorkspaceSize('one', 'Just me')">Just me</a></li>
                            <li><a class="dropdown-item rounded-3" href="#" onclick="createWorkspaceSize('two-five', '2-5')">2-5</a></li>
                            <li><a class="dropdown-item rounded-3" href="#" onclick="createWorkspaceSize('six-fifteen', '6-15')">6-15</a></li>
                        </ul>
                        <input type="hidden" name="workspace_space" id="create-size-workspace" value="one">
                    </div>

                    <br>
                    <h5>Choose role for inviters</h5>
                    <div class="dropdown">
                        <button class="btn btn-sm dropdown-toggle custom_priorety_select_btn custom_priorety_select_btn_lg"
                            type="button" data-bs-toggle="dropdown">
                            <span id="create-invite-workspace-label">Member</span>
                        </button>
                        <ul class="dropdown-menu shadow custom_priorety_select_menu custom_priorety_select_menu_lg">
                            <li><a class="dropdown-item rounded-3" href="#" onclick="createInvitePermission('admin', 'Admin')">Admin</a></li>
                            <li><a class="dropdown-item rounded-3" href="#" onclick="createInvitePermission('member', 'Member')">Member</a></li>
                        </ul>
                        <input type="hidden" name="invite_role" id="create-invite-workspace" value="admin">
                    </div>
                
                </div>

                
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Create</button>
                </div>
            </form>
            
        </div>
    </div>
</div>
